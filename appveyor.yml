version: 1.0.{build}
configuration: Release
image: Visual Studio 2022
pull_requests:
  do_not_increment_build_number: true

install:
- ps: |
    $env:DOTNET_CLI_TELEMETRY_OPTOUT = 1
    Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
    .\dotnet-install.ps1 -Channel 10.0 -InstallDir "$env:ProgramFiles\dotnet"
    dotnet --version

build_script:
- dotnet restore
- dotnet build --configuration Release --no-restore

test_script:
- dotnet test --configuration Release --no-build

after_test:
- ps: |
    if ($env:APPVEYOR_REPO_BRANCH -eq "main" -and -not $env:APPVEYOR_PULL_REQUEST_NUMBER) {
      dotnet pack --configuration Release --no-build --output ./nupkg
      dotnet nuget push ./nupkg/*.nupkg --api-key $env:nugetApiKey --source https://api.nuget.org/v3/index.json --skip-duplicate
    }